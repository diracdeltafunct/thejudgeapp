<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Judge App</title>
    <link rel="stylesheet" href="./src/styles/base.css" />
  </head>
  <body>
    <main id="app"></main>
    <div id="tournament-subnav" class="rules-subnav hidden">
      <a href="#/tournament/new" class="subnav-link" data-tournament="new">Add New</a>
      <a href="#/tournament/active" class="subnav-link" data-tournament="active">Active Tournaments</a>
    </div>
    <div id="rules-subnav" class="rules-subnav hidden">
      <a href="#/rules/cr" class="subnav-link" data-doc="cr">CR</a>
      <a href="#/rules/mtr" class="subnav-link" data-doc="mtr">MTR</a>
      <a href="#/rules/ipg" class="subnav-link" data-doc="ipg">IPG</a>

      <button class="nav-link" id="rules-toggle" data-page="rules">

      <a href="#/cards" class="nav-link" data-page="cards">
