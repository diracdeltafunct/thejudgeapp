<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Judge App – CR</title>
  <style>
    :root {
      --bg: #000000;
      --bg-surface: #111111;
      --bg-card: #1a1a1a;
      --text: #e6e6e6;
      --text-muted: #a0a0a0;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --border: #2a2a2a;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow: hidden;
    }
    body { display: flex; flex-direction: column; }

    /* Nav bar */
    .nav-bar {
      display: flex;
      align-items: stretch;
      justify-content: space-around;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      height: 56px;
    }
    .nav-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      flex: 1;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.7rem;
      padding: 0.4rem 0;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    .nav-link.active { color: var(--accent); }
    .nav-icon { width: 22px; height: 22px; }

    /* Rules subnav */
    .rules-subnav {
      display: flex;
      position: fixed;
      bottom: 56px; left: 0; right: 0;
      z-index: 99;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .subnav-link {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 0;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    .subnav-link + .subnav-link { border-left: 1px solid var(--border); }
    .subnav-link.active { color: var(--accent); }

    /* App content */
    #app {
      padding: 1rem 1rem 72px;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
      overflow-y: auto;
      height: 100%;
      box-sizing: border-box;
    }

    /* Rules Viewer */
    .rules-viewer {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 56px - 2rem);
    }
    .rules-toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
      margin-bottom: 0.5rem;
    }
    .back-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.35rem 0.75rem;
      font-size: 0.85rem;
      white-space: nowrap;
      opacity: 0.35;
    }
    .breadcrumb {
      font-size: 0.9rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .search-container {
      position: relative;
      margin-bottom: 0.75rem;
    }
    .search-container input {
      width: 100%;
      padding: 0.6rem 1rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }
    .rv-content {
      flex: 1;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    /* TOC */
    .toc-list {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .toc-section-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--accent);
      margin-bottom: 0.4rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--border);
    }
    .toc-subsections {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toc-entry {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      background: none;
      border: none;
      border-radius: var(--radius);
      padding: 0.4rem 0.5rem;
      text-align: left;
      cursor: pointer;
      color: var(--text);
      width: 100%;
    }
    .entry-number {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
      min-width: 2.5rem;
    }
    .entry-title { font-size: 0.9rem; }
  </style>
</head>
<body>
